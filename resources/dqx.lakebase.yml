# Lakebase instance and database for DQX. Names match databricks.yml variables
# (lakebase_instance_name per target) so bundle and app stay in sync.
# Requires Databricks CLI 0.265.0+. Not included by default; app uses existing catalog.
resources:
  database_instances:
    dqx_instance:
      name: ${var.lakebase_instance_name}
      capacity: CU_1

  database_catalogs:
    dqx_catalog:
      database_instance_name: ${resources.database_instances.dqx_instance.name}
      name: dqx_catalog_${bundle.target}
      database_name: dqx_rules
      create_database_if_not_exists: true
